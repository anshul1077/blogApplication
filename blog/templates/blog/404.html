{% extends 'blog/base.html' %}

{% block full_content %}
<style>
.notfound-page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.notfound-card {
  max-width: 820px;
  width: 100%;
  text-align: center;
  padding: 3rem 2rem;
  background: #111827;
  border-radius: 32px;
  box-shadow: 0 36px 120px rgba(15, 23, 42, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.notfound-badge {
  display: inline-block;
  margin-bottom: 1.25rem;
  padding: .85rem 1.5rem;
  border-radius: 999px;
  background: rgba(37, 99, 235, 0.12);
  color: #93c5fd;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  font-size: .85rem;
}

.notfound-card h1 {
  font-size: clamp(4rem, 10vw, 6rem);
  margin-bottom: 0.5rem;
  color: #ffffff;
}

.notfound-card h2 {
  font-size: clamp(2rem, 3vw, 3rem);
  margin-bottom: 1rem;
  color: #e2e8f0;
}

.notfound-card p {
  max-width: 560px;
  margin: 0 auto 2rem;
  color: rgba(226, 232, 240, 0.78);
  line-height: 1.85;
}

.notfound-card .btn {
  border-radius: 999px;
  padding: 1rem 2rem;
  font-size: 1rem;
}

@media (max-width: 768px) {
  .notfound-page {
    padding: 3rem 1rem;
  }

  .notfound-card {
    padding: 2rem 1.5rem;
  }
}
</style>
<section class="notfound-page">
  <div class="notfound-card">
    <span class="notfound-badge">404 error</span>
    <h1>Page Not Found</h1>
    <h2>Sorry, we can’t find that page.</h2>
    <p>The link you followed may be broken, or the page may have been removed. Use the button below to return home and continue browsing.</p>
    <a href="{% url 'blog-home' %}" class="btn btn-primary">Go Back Home</a>
  </div>
</section>
{% endblock %}
